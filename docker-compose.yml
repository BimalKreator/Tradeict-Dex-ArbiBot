version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: arbitrage
    ports:
      - "5432:5432"
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
  api:
    build: .
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/arbitrage
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
  frontend:
    build: .
    restart: always
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000/get-arbitrage-data
    ports:
      - "80:8501"
